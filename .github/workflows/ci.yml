name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml declares requires-python = ">=3.11" -- this
        # matrix exists specifically to verify that claim is actually
        # true for 3.12 and 3.13, not just the 3.11 this job ran
        # against previously. A compatibility claim that's never
        # checked against anything but the oldest supported version is
        # the same class of gap as a README claim never checked
        # against reality -- unverified until something actually runs
        # it.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Install built wheel (with dashboard extra) in a clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install "$(echo dist/*.whl)[dashboard]"
          /tmp/smoke-venv/bin/redteam-toolkit --version
          /tmp/smoke-venv/bin/redteam-toolkit --help

      - name: "Integration test: every README-documented command, against the real installed wheel"
        # The existing e2e-smoke-test job below exercises a lot of real
        # behavior already, but via CliRunner against the dev source tree
        # -- never the actual installed package a real `pip install
        # redteam-toolkit` user gets. This is the gap that let the
        # serve/[dashboard]-message and docs/legal-and-ethics.md-path
        # bugs ship past 390+ passing tests: those exercised the CLI
        # in-process, never a real subprocess against a real wheel.
        run: |
          set -euo pipefail
          RT=/tmp/smoke-venv/bin/redteam-toolkit
          WORK=$(mktemp -d)
          cd "$WORK"

          echo "::group::Start the mock target server (background subprocess, real socket)"
          PYTHONPATH="$GITHUB_WORKSPACE" python3 -c "
          import sys, time
          sys.path.insert(0, '$GITHUB_WORKSPACE')
          from tests.fixtures.mock_target.server import start_mock_target
          server, port = start_mock_target()
          with open('/tmp/mock_port.txt', 'w') as f:
              f.write(str(port))
          time.sleep(120)
          " &
          MOCK_PID=$!
          sleep 2
          PORT=$(cat /tmp/mock_port.txt)
          echo "Mock target on port $PORT"
          echo "::endgroup::"

          echo "::group::init for all three engagement templates"
          for t in web-app network internal-redteam; do
            $RT init --output "auth-$t.yml" --template "$t"
            test -s "auth-$t.yml"
          done
          echo "::endgroup::"

          echo "::group::Fill in a real authorization.yml"
          # Uses the smoke-venv's own python3, not the bare system one --
          # PyYAML is a dependency of the wheel itself (installed into
          # the venv), but the `build` job never runs `pip install -r
          # requirements.txt` against the system interpreter, so a bare
          # `python3 -c "import yaml"` here would fail with
          # ModuleNotFoundError in CI specifically (this sandbox's system
          # python3 happens to already have PyYAML installed globally for
          # unrelated reasons, which is exactly why this difference
          # wasn't caught by local testing and needed a real CI run to
          # surface).
          /tmp/smoke-venv/bin/python3 -c "
          import datetime, yaml
          now = datetime.datetime.now(datetime.timezone.utc)
          data = {
              'engagement_id': 'ci-integration-test',
              'authorized_by': 'CI', 'authorized_contact_email': 'ci@example.com',
              'client': 'CI Integration Test',
              'scope': {'targets': ['127.0.0.1'], 'excluded_targets': [], 'allowed_categories': ['recon', 'vuln-id', 'active']},
              'window': {
                  'start': (now - datetime.timedelta(hours=1)).isoformat(),
                  'end': (now + datetime.timedelta(days=1)).isoformat(),
              },
              'confirmation_phrase': 'I confirm authorization for ci-integration-test',
          }
          with open('authorization.yml', 'w') as f:
              yaml.safe_dump(data, f)
          "
          echo "::endgroup::"

          echo "::group::validate-scope, status"
          $RT validate-scope --authorization authorization.yml
          $RT status --authorization authorization.yml
          echo "::endgroup::"

          echo "::group::recon -- multi-target via --targets-file"
          echo "127.0.0.1" > targets.txt
          $RT recon --targets-file targets.txt --authorization authorization.yml \
            --modules port_scanner --db engagements.db

          OUTPUT=$($RT recon "http://127.0.0.1:$PORT" --authorization authorization.yml \
            --modules http_posture --db engagements.db)
          echo "$OUTPUT" | grep -q "http_posture" || (echo "recon did not run http_posture" && exit 1)
          echo "::endgroup::"

          echo "::group::vuln-id -- with --session-header (would have caught a wiring regression)"
          $RT vuln-id "http://127.0.0.1:$PORT" --authorization authorization.yml \
            --modules http_posture --session-header "Cookie: session=test123" --db engagements.db
          echo "::endgroup::"

          echo "::group::active -- real SQLi detection against the mock target's known-vulnerable route"
          OUTPUT=$($RT active "http://127.0.0.1:$PORT/vulnerable/sqli" \
            --authorization authorization.yml --confirm ci-integration-test \
            --modules sqli_detection --db engagements.db)
          echo "$OUTPUT" | grep -q "CRITICAL" || (echo "active did not detect the mock target's known SQLi" && exit 1)
          echo "::endgroup::"

          echo "::group::diff previous latest -- both text and --json"
          # diff exits 1 when it finds a new CRITICAL/HIGH finding (by
          # design, for CI use) -- the SQLi detection above is exactly
          # such a finding, so THAT exit is expected here, hence || true
          # on the plain-text call. The --json call's own validation must
          # NOT be swallowed the same way: capture its output to a file
          # first (ignoring diff's own regression-exit there too), then
          # validate that file with json.load as a SEPARATE command with
          # its own real exit code -- a combined `cmd1 | cmd2 || true`
          # pipeline would silently swallow a genuine JSON parse failure
          # from cmd2 along with cmd1's expected non-zero exit, which is
          # exactly the gap that let a reintroduced version of the diff
          # --json corruption bug pass this job silently during
          # verification (caught only by the separate unit test) -- not
          # assumed safe from reading the script, fixed after actually
          # observing that gap on real CI.
          $RT diff previous latest --authorization authorization.yml --db engagements.db || true
          $RT diff previous latest --authorization authorization.yml --db engagements.db --json > /tmp/diff-output.json || true
          python3 -c "import json; json.load(open('/tmp/diff-output.json'))"
          echo "::endgroup::"

          echo "::group::report --format both"
          $RT report --authorization authorization.yml --db engagements.db --format both --output ci-report
          test -s ci-report-report.html
          test -s ci-report-report.pdf
          head -c5 ci-report-report.pdf | grep -q "%PDF-"
          echo "::endgroup::"

          echo "::group::serve -- would have caught the [dashboard]-message Rich-markup-bracket bug"
          $RT serve --db engagements.db --port 8290 &
          SERVE_PID=$!
          sleep 2
          curl -sf http://127.0.0.1:8290/ -o /dev/null
          curl -sf http://127.0.0.1:8290/api/engagements -o /tmp/engagements.json
          python3 -c "import json; data = json.load(open('/tmp/engagements.json')); assert len(data) > 0, 'no engagements returned'"
          kill $SERVE_PID
          wait $SERVE_PID 2>/dev/null || true
          echo "::endgroup::"

          kill $MOCK_PID 2>/dev/null || true
          echo "All integration checks passed."

  e2e-smoke-test:
    name: End-to-end smoke test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Run the full pipeline as one connected flow against the mock target
        run: |
          set -e
          export PYTHONPATH=.

          # 1. init --template (each engagement-type template)
          python -m redteam_toolkit.cli init --output /tmp/auth.yml --template web-app

          # 2. Fill in the template with real values for this smoke test
          python3 - << 'PYEOF'
          import datetime, yaml
          now = datetime.datetime.now(datetime.timezone.utc)
          with open("/tmp/auth.yml") as f:
              data = yaml.safe_load(f)
          data["engagement_id"] = "ci-smoke-test"
          data["authorized_by"] = "CI"
          data["authorized_contact_email"] = "ci@example.com"
          data["client"] = "CI Smoke Test"
          data["scope"]["targets"] = ["127.0.0.1"]
          data["scope"]["allowed_categories"] = ["recon", "active"]
          data["window"]["start"] = (now - datetime.timedelta(hours=1)).isoformat()
          data["window"]["end"] = (now + datetime.timedelta(days=1)).isoformat()
          data["confirmation_phrase"] = "confirmed"
          with open("/tmp/auth.yml", "w") as f:
              yaml.safe_dump(data, f)
          PYEOF

          # 3. validate-scope
          python -m redteam_toolkit.cli validate-scope --authorization /tmp/auth.yml

          # 4. status
          python -m redteam_toolkit.cli status --authorization /tmp/auth.yml

          # 5. Start the mock target and run recon + active against it, persisting to --db
          python3 - << 'PYEOF'
          import sys
          sys.path.insert(0, ".")
          from tests.fixtures.mock_target.server import start_mock_target
          from click.testing import CliRunner
          from redteam_toolkit.cli import cli

          server, port = start_mock_target()
          try:
              runner = CliRunner()

              r = runner.invoke(cli, [
                  "recon", "127.0.0.1", "--authorization", "/tmp/auth.yml",
                  "--db", "/tmp/eng.db", "--modules", "port_scanner",
              ])
              assert r.exit_code == 0, r.output
              print("recon: OK")

              r = runner.invoke(cli, [
                  "active", f"http://127.0.0.1:{port}/vulnerable/sqli",
                  "--authorization", "/tmp/auth.yml", "--confirm", "ci-smoke-test",
                  "--db", "/tmp/eng.db", "--modules", "sqli_detection",
              ])
              assert r.exit_code == 0, r.output
              assert "CRITICAL" in r.output, "expected the mock target's known SQLi to be detected"
              print("active: OK — SQLi correctly detected")

              # 6. report — both formats
              r = runner.invoke(cli, [
                  "report", "--authorization", "/tmp/auth.yml", "--db", "/tmp/eng.db",
                  "--format", "both", "--output", "/tmp/ci-smoke-report",
              ])
              assert r.exit_code == 0, r.output
              print("report: OK")
          finally:
              server.shutdown()
          PYEOF

          # 7. Confirm both report files actually exist and are non-trivial
          test -s /tmp/ci-smoke-report-report.html
          test -s /tmp/ci-smoke-report-report.pdf
          head -c5 /tmp/ci-smoke-report-report.pdf | grep -q "%PDF-"
          grep -q "SQL injection" /tmp/ci-smoke-report-report.html
          echo "End-to-end smoke test: all stages passed"

