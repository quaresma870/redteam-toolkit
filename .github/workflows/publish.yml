name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC) — no token stored

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Install build tooling
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Confirm template data files are included in the wheel
        run: |
          python3 -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          required = [
              'redteam_toolkit/templates/authorization-web-app.yml.example',
              'redteam_toolkit/templates/authorization-network.yml.example',
              'redteam_toolkit/templates/authorization-internal-redteam.yml.example',
          ]
          missing = [r for r in required if r not in names]
          if missing:
              raise SystemExit(f'Missing from wheel: {missing}')
          print('All template data files present in the wheel.')
          "

      # Trusted publishing (OIDC) — no PYPI_API_TOKEN secret needed.
      # Configure this once at https://pypi.org/manage/project/redteam-toolkit/settings/publishing/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
